<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Felipe Santos</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --transition: 0.35s cubic-bezier(.4,0,.2,1); }

    [data-theme="dark"] {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(124,106,255,0.45);
      --accent: #7c6aff;
      --accent2: #ff6a9b;
      --text: #f0eeff;
      --muted: #6b6a80;
      --glow: rgba(124,106,255,0.13);
      --toggle-bg: rgba(255,255,255,0.07);
      --shadow: 0 8px 32px rgba(124,106,255,0.18);
    }

    [data-theme="light"] {
      --bg: #f4f3ff;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.07);
      --border-hover: rgba(107,88,240,0.45);
      --accent: #6b58f0;
      --accent2: #f0527e;
      --text: #1a1828;
      --muted: #8884a8;
      --glow: rgba(107,88,240,0.1);
      --toggle-bg: rgba(0,0,0,0.06);
      --shadow: 0 8px 32px rgba(107,88,240,0.12);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
      transition: background var(--transition), color var(--transition);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transition: background var(--transition);
    }

    /* Toggle pill */
    .theme-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 10;
      width: 72px;
      height: 36px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      transition: border-color var(--transition), background var(--transition);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      user-select: none;
      position: fixed;
    }

    .theme-toggle:hover { border-color: var(--border-hover); }
    .theme-toggle:active .toggle-thumb { transform: scale(0.88); }

    .toggle-emoji {
      font-size: 0.9rem;
      line-height: 1;
      z-index: 1;
      pointer-events: none;
    }

    .toggle-thumb {
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      transition: left var(--transition), transform 0.15s ease;
      left: 4px;
      box-shadow: 0 2px 8px rgba(124,106,255,0.35);
    }

    [data-theme="light"] .toggle-thumb {
      left: 38px;
    }

    /* Container */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      width: 90px;
      height: 90px;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--accent), var(--accent2), var(--accent));
      animation: spin 4s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-inner {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--bg);
      overflow: hidden;
      transition: background var(--transition);
    }

    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      border-radius: 50%;
      display: block;
    }

    /* Header */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .name span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .bio {
      font-family: 'Fira Code', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.02em;
      transition: color var(--transition);
    }

    .bio::before { content: '> '; color: var(--accent); }

    /* Status */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.3rem 0.85rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      animation: fadeUp 0.7s 0.15s ease both;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background var(--transition), color var(--transition);
      animation: fadeUp 0.7s ease both;
      position: relative;
      overflow: hidden;
    }

    .link-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(124,106,255,0.06), rgba(255,106,155,0.04));
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .link-item:hover { transform: translateY(-2px) scale(1.01); border-color: var(--border-hover); box-shadow: var(--shadow); }
    .link-item:hover::before { opacity: 1; }
    .link-item:active { transform: scale(0.98); }
    .link-item:nth-child(1) { animation-delay: 0.2s; }
    .link-item:nth-child(2) { animation-delay: 0.3s; }
    .link-item:nth-child(3) { animation-delay: 0.4s; }

    .link-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-github  { background: rgba(180,180,200,0.1); }
    .icon-linkedin{ background: rgba(10,102,194,0.15); }
    .icon-cv      { background: rgba(124,106,255,0.15); }

    .link-text { flex: 1; }

    .link-label {
      font-size: 0.7rem;
      font-family: 'Fira Code', monospace;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.15rem;
      transition: color var(--transition);
    }

    .link-title { font-size: 0.98rem; font-weight: 700; letter-spacing: -0.01em; }

    .link-arrow {
      color: var(--muted);
      font-size: 1.1rem;
      transition: transform 0.2s ease, color 0.2s ease;
    }
    .link-item:hover .link-arrow { transform: translateX(4px); color: var(--accent); }

    /* Footer */
    .footer {
      font-family: 'Fira Code', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      opacity: 0.45;
      animation: fadeUp 0.7s 0.6s ease both;
      transition: color var(--transition);
    }
  </style>
</head>
<body>

  </div>

  <script>
    const saved = localStorage.getItem('theme') || 'dark';
    applyTheme(saved);

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', next);
      applyTheme(next);
    }
  </script>

</html>
